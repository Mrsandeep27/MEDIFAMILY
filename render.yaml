services:
  - type: web
    name: medilog
    runtime: node
    plan: free
    buildCommand: npx prisma generate && npm run build
    startCommand: npx prisma migrate deploy && npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: medilog-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: GOOGLE_AI_API_KEY
        sync: false
      - key: NODE_ENV
        value: production

databases:
  - name: medilog-db
    plan: free
    databaseName: medilog
    postgresMajorVersion: "16"
